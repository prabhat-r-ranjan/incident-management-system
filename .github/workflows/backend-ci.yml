name: Backend CI - Build Docker Image

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  REGISTRY: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
  IMAGE_NAME: incident-backend

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build Spring Boot app
        run: mvn clean package -DskipTests

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Run Docker container
        run: |
          docker run -d \
            --name incident-backend-test \
            -p 8081:8081 \
            $IMAGE_NAME:${{ github.sha }}

      - name: Wait for app startup
        run: sleep 20

      - name: Test backend health/API
        run: |
          curl -f http://localhost:8081/incidents || exit 1

      - name: Stop container
        if: always()
        run: |
          docker stop incident-backend-test || true
          docker rm incident-backend-test || true